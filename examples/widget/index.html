<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preferences Widget</title>
  <link rel="stylesheet" href="../../style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section id="preferences-widget" class="floating-box" aria-labelledby="widget-heading">
  <h3 id="widget-heading">Site Preferences</h3>
  <div class="widget-content">

    <div class="option">
      <label for="motion">Reduced Motion</label>
      <input type="checkbox" name="reduced motion" id="motion">
    </div>

    <div class="option">
      <label for="contrast">High Contrast</label>
      <input type="checkbox" name="high contrast" id="contrast">
    </div>

    <div class="option">
      <label for="colorscheme">Dark Colorscheme</label>
      <input type="checkbox" name="dark colorscheme" id="colorscheme">
    </div>

  </div>
</section>

<header>
  <nav><a href="../../index.html">← Back to Overview</a></nav>
  <h1>Preferences Widget</h1>
</header>

<main id="main-content">
  <section class="card">
    <h2>Changing Styles</h2>
    <p>Activating and deactivating site preferences leads to a different experience!</p>
    <div class="spinning-container">
      <div class="square"></div>
    </div>
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
